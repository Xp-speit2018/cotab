name: Generate Wiki

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile generator script
        run: npx -p typescript tsc --project scripts/tsconfig.scripts.json

      - name: Generate Actions-Full-List.md
        run: node dist-scripts/generate-actions-wiki.js > /tmp/Actions-Full-List.md

      - name: Generate Signaling-Server-API.md
        run: node dist-scripts/generate-server-api-wiki.js > /tmp/Signaling-Server-API.md

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki

      - name: Update wiki pages
        working-directory: wiki
        run: |
          cp /tmp/Actions-Full-List.md Actions-Full-List.md
          cp /tmp/Signaling-Server-API.md Signaling-Server-API.md

          # Update the auto-generated pages table in Home.md
          node -e "
            const fs = require('fs');
            const today = new Date().toISOString().slice(0, 10);
            const table = [
              '| Page | Last updated |',
              '|------|-------------|',
              '| [Actions — Full List](Actions-Full-List) | ' + today + ' |',
              '| [Signaling Server API](Signaling-Server-API) | ' + today + ' |',
            ].join('\n');
            let home = fs.readFileSync('Home.md', 'utf-8');
            home = home.replace(
              /<!-- GENERATED-PAGES:START -->[\s\S]*?<!-- GENERATED-PAGES:END -->/,
              '<!-- GENERATED-PAGES:START -->\n' + table + '\n<!-- GENERATED-PAGES:END -->'
            );
            fs.writeFileSync('Home.md', home);
          "

          git add Actions-Full-List.md Signaling-Server-API.md Home.md
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "docs: update wiki pages"
            git push
          else
            echo "No changes to wiki"
          fi
